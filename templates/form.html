<!DOCTYPE html>
<html lang="en">
<head>
    <meta超 charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musician Playbill Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f5f7; padding: 20px; }
        .form-container { max-width: 500px; background: white; padding: 30px; margin: 0 auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; }
        .field { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 120px; resize: vertical; }
        input[type="file"] { border: none; padding: 0; }
        button { background: #0070f3; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #0051a8; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Musician Profile Submission</h2>
        <!-- Important: enctype is required for processing file uploads -->
        <form action="/" method="POST" enctype="multipart/form-data">
            <div class="field">
                <label for="name">Full Professional Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g., Jane Doe">
            </div>
            <div class="field">
                <label for="headshot">High-Resolution Headshot</label>
                <input type="file" id="headshot" name="headshot" accept="image/*" required>
            </div>
            <div class="field">
                <label for="bio">Performance Biography</label>
                <textarea id="bio" name="bio" required placeholder="Write a short biography for the program..."></textarea>
            </div>
            <button type="submit">Submit to Playbill</button>
        </form>
    </div>
</body>
</html>
